<div id="htCommentsModal" class="remarks-modal">
    <style>
        .remarks-modal {
            position: fixed; inset: 0; background: rgba(15,23,42,0.58); backdrop-filter: blur(6px);
            z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 22px;
            font-family: 'Inter', sans-serif;
        }
        .remarks-shell {
            width: min(1120px, 100%); max-height: 88vh; background: #fff; border: 1px solid #dbe3ee;
            border-left: 8px solid #1e40af; border-radius: 18px; box-shadow: 0 26px 70px rgba(15,23,42,0.28);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .remarks-head {
            background: #0f172a; color: #fff; padding: 22px 26px; display: flex;
            justify-content: space-between; gap: 18px; align-items: flex-start;
        }
        .remarks-head h2 { margin: 0 0 5px; font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; }
        .remarks-head p { margin: 0; color: #dbeafe; font-weight: 700; font-size: 13px; }
        .close-btn {
            width: 38px; height: 38px; border: none; border-radius: 10px;
            background: rgba(255,255,255,0.12); color: #fff; font-size: 24px; cursor: pointer;
        }
        .remarks-body { padding: 24px 26px; overflow-y: auto; }
        .ht-comment-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
        .ht-comment-card {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 15px;
        }
        .ht-comment-card label {
            display: block; color: #64748b; font-size: 11px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px;
        }
        .ht-comment-card textarea {
            width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; background: #fff;
            color: #0f172a; padding: 11px 12px; font-weight: 750; resize: vertical; outline: none;
        }
        .ht-comment-card.ee { border-left: 5px solid #22c55e; }
        .ht-comment-card.me { border-left: 5px solid #3b82f6; }
        .ht-comment-card.ae { border-left: 5px solid #f59e0b; }
        .ht-comment-card.be { border-left: 5px solid #ef4444; }
        .remarks-footer {
            padding: 18px 26px; background: #f8fafc; border-top: 1px solid #e2e8f0;
            display: flex; justify-content: flex-end; gap: 12px;
        }
        .footer-btn { border: none; border-radius: 10px; min-height: 44px; padding: 0 20px; font-weight: 900; cursor: pointer; }
        .cancel-btn { background: #e2e8f0; color: #334155; }
        .save-btn { background: #1e40af; color: #fff; }
        @media (max-width: 820px) { .ht-comment-grid { grid-template-columns: 1fr !important; } }
        @media (max-width: 640px) {
            .remarks-modal { padding: 10px; }
            .remarks-shell { border-radius: 14px; max-height: 95vh; border-left-width: 5px; }
            .remarks-head { padding: 16px 18px; flex-direction: column; gap: 12px; }
            .remarks-head h2 { font-size: 18px; }
            .remarks-head p { font-size: 11px; }
            .close-btn { align-self: flex-end; }
            .remarks-body { padding: 16px 18px; }
            .ht-comment-grid { grid-template-columns: 1fr !important; gap: 10px; }
            .ht-comment-card { padding: 12px; }
            .ht-comment-card textarea { font-size: 13px; min-height: 60px; }
            .remarks-footer { padding: 14px 18px; flex-direction: column; gap: 8px; }
            .footer-btn { width: 100%; justify-content: center; min-height: 42px; font-size: 13px; }
        }
    </style>

    <form id="htCommentsForm" method="POST" action="{% url 'manage_headteacher_comments' %}?year={{ selected_year }}&term={{ selected_term }}&assessment={{ selected_assessment }}">
        {% csrf_token %}
        <div class="remarks-shell">
            <div class="remarks-head">
                <div>
                    <h2>Headteacher Remarks</h2>
                    <p>Whole School | {{ selected_term }} | {{ selected_year }}. Configure headteacher remarks for each performance level.</p>
                </div>
                <button type="button" class="close-btn" onclick="closeHtCommentsModal()">&times;</button>
            </div>

            <div class="remarks-body">
                <div class="ht-comment-grid">
                    {% if is_primary %}
                    <div class="ht-comment-card ee"><label>EE - Excellent</label><textarea name="ht_comment_ee" rows="3">{{ comment_obj.ht_comment_ee }}</textarea></div>
                    <div class="ht-comment-card me"><label>ME - Good</label><textarea name="ht_comment_me" rows="3">{{ comment_obj.ht_comment_me }}</textarea></div>
                    <div class="ht-comment-card ae"><label>AE - Satisfactory</label><textarea name="ht_comment_ae" rows="3">{{ comment_obj.ht_comment_ae }}</textarea></div>
                    <div class="ht-comment-card be"><label>BE - Needs Improvement</label><textarea name="ht_comment_be" rows="3">{{ comment_obj.ht_comment_be }}</textarea></div>
                    {% else %}
                    <div class="ht-comment-card ee"><label>EE1 - Exceptional</label><textarea name="ht_comment_ee1" rows="3">{{ comment_obj.ht_comment_ee1 }}</textarea></div>
                    <div class="ht-comment-card ee"><label>EE2 - High Mastery</label><textarea name="ht_comment_ee2" rows="3">{{ comment_obj.ht_comment_ee2 }}</textarea></div>
                    <div class="ht-comment-card me"><label>ME1 - Solid Competence</label><textarea name="ht_comment_me1" rows="3">{{ comment_obj.ht_comment_me1 }}</textarea></div>
                    <div class="ht-comment-card me"><label>ME2 - Basic Competence</label><textarea name="ht_comment_me2" rows="3">{{ comment_obj.ht_comment_me2 }}</textarea></div>
                    <div class="ht-comment-card ae"><label>AE1 - Approaching</label><textarea name="ht_comment_ae1" rows="3">{{ comment_obj.ht_comment_ae1 }}</textarea></div>
                    <div class="ht-comment-card ae"><label>AE2 - Developing</label><textarea name="ht_comment_ae2" rows="3">{{ comment_obj.ht_comment_ae2 }}</textarea></div>
                    <div class="ht-comment-card be"><label>BE1 - Emerging</label><textarea name="ht_comment_be1" rows="3">{{ comment_obj.ht_comment_be1 }}</textarea></div>
                    <div class="ht-comment-card be"><label>BE2 - Critical Support</label><textarea name="ht_comment_be2" rows="3">{{ comment_obj.ht_comment_be2 }}</textarea></div>
                    {% endif %}
                </div>
            </div>

            <div class="remarks-footer">
                <button type="button" class="footer-btn cancel-btn" onclick="closeHtCommentsModal()">Cancel</button>
                <button type="submit" class="footer-btn save-btn">Save Headteacher Remarks</button>
            </div>
        </div>
    </form>
</div>
